<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Login</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f23;
    color: #f8fafc;
}

.container {
    display: flex;
    height: 100vh;
}

/* Left Panel */
.left {
    width: 40%;
    background: #0f0f23;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.circle1, .circle2 {
    position: absolute;
    border-radius: 50%;
}

.circle1 {
    width: 200px;
    height: 200px;
    background: #1e1b4b;
    top: 100px;
    left: 50px;
}

.circle2 {
    width: 200px;
    height: 200px;
    background: #312e81;
    top: 200px;
    left: 150px;
}

.left h1 {
    z-index: 1;
}

.left p {
    color: #94a3b8;
    z-index: 1;
}

/* Right Panel */
.right {
    width: 60%;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form {
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: #0f172a;
    border: 1px solid #334155;
    color: white;
}

input:focus {
    border-color: #6366f1;
    outline: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 20px;
    background: #6366f1;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

.link {
    color: #6366f1;
    cursor: pointer;
    font-size: 14px;
}

.options {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 14px;
}

.social {
    display: flex;
    justify-content: center;
    margin-top: 15px;
}

.social div {
    background: #0f172a;
    margin: 5px;
    padding: 10px;
    cursor: pointer;
}

.error {
    color: red;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Left -->
    <div class="left">
        <div class="circle1"></div>
        <div class="circle2"></div>

        <h1>Secure Access</h1>
        <p>to Your Account</p>
        <p>✓ Encrypted</p>
        <p>✓ Secure</p>
        <p>✓ Fast</p>
    </div>

    <!-- Right -->
    <div class="right">
        <div class="form">

            <h2>Welcome Back</h2>
            <p style="color:#94a3b8;">Sign in to continue</p>

            <label>Email</label>
            <input type="text" id="email">

            <label>Password</label>
            <input type="password" id="password">

            <div class="options">
                <label><input type="checkbox"> Remember</label>
                <span class="link" onclick="forgot()">Forgot?</span>
            </div>

            <button onclick="login()">Sign In</button>

            <p class="error" id="error"></p>

            <div style="text-align:center; margin-top:10px;">or</div>

            <div class="social">
                <div>G</div>
                <div>A</div>
                <div>in</div>
            </div>

            <p style="text-align:center; margin-top:10px;">
                Don't have account? <span class="link">Sign up</span>
            </p>

        </div>
    </div>

</div>

<script>
function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let error = document.getElementById("error");

    error.innerText = "";

    if (email === "") {
        error.innerText = "Enter email";
        return;
    }

    if (!validateEmail(email)) {
        error.innerText = "Invalid email";
        return;
    }

    if (password.length < 6) {
        error.innerText = "Password must be 6+ chars";
        return;
    }

    alert("Login Successful!");
}

function forgot() {
    alert("Reset link sent!");
}
</script>

</body>
</html>
